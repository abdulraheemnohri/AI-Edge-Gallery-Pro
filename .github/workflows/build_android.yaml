name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x Android/src/gradlew

    - name: Build with Gradle
      run: cd Android/src && ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: Android/src/app/build/outputs/apk/debug/app-debug.apk

    - name: Download Link Info
      run: echo "APK Download link will be available in the 'Artifacts' section of this workflow run."
